// FORECAST UPDATES TAB — activities that need forecast revision
// ═══════════════════════════════════════════════════════════════════════════
function renderForecastUpdatesTab() {
  // Find all activities flagged late
  const lateActs = activities
    .filter(a => a.status !== "completed")
    .map(a => ({ act: a, late: getForecastLateStatus(a) }))
    .filter(x => x.late !== null);
  
  if (lateActs.length === 0) {
    return `
      <div style="background:#F0FDF4; border:1px solid #16A34A; border-radius:8px; padding:24px; margin:16px 0; text-align:center">
        <div style="font-size:48px">✅</div>
        <div style="font-size:18px; font-weight:700; color:#15803D; margin:8px 0">All forecasts are up to date</div>
        <div style="font-size:13px; color:#166534">No activities require forecast revision as of ${getToday()}.</div>
      </div>`;
  }
  
  // Group by contractor
  const byContractor = {};
  lateActs.forEach(x => {
    if (!byContractor[x.act.contractor]) byContractor[x.act.contractor] = [];
    byContractor[x.act.contractor].push(x);
  });
  
  // Summary stats
  const planLateCount = lateActs.filter(x => x.late.type === "planned_late").length;
  const inProgLateCount = lateActs.filter(x => x.late.type === "in_progress_late").length;
  const criticalCount = lateActs.filter(x => x.late.severity === "critical").length;
  
  const summary = `
    <div class="forecast-summary">
      <div class="forecast-summary-title">
        ⏰ Forecast Updates Required
        <span class="forecast-summary-date">As of ${getToday()}</span>
      </div>
      <div class="forecast-summary-stats">
        <div class="fcst-stat"><div class="fcst-stat-num" style="color:#DC2626">${lateActs.length}</div><div class="fcst-stat-lbl">Total to update</div></div>
        <div class="fcst-stat"><div class="fcst-stat-num" style="color:#DC2626">${planLateCount}</div><div class="fcst-stat-lbl">Planned late</div></div>
        <div class="fcst-stat"><div class="fcst-stat-num" style="color:#F59E0B">${inProgLateCount}</div><div class="fcst-stat-lbl">In progress late</div></div>
        <div class="fcst-stat"><div class="fcst-stat-num" style="color:#7F1D1D">${criticalCount}</div><div class="fcst-stat-lbl">Critical (&gt;14d)</div></div>
        <div class="fcst-stat"><div class="fcst-stat-num" style="color:#0A2540">${Object.keys(byContractor).length}</div><div class="fcst-stat-lbl">Contractors</div></div>
      </div>
      <div class="forecast-summary-action">
        💡 <b>Action required:</b> Contractors must update their forecast dates for these activities and explain the reason for the delay.
        ${isAdmin() ? `<button class="btn-export" onclick="exportForecastUpdatesXLSX()" style="margin-left:12px">📊 Export Excel (1 sheet per contractor)</button>` : ""}
      </div>
    </div>`;
  
  // Sort contractors by # late activities
  const sortedContractors = Object.entries(byContractor).sort((a, b) => b[1].length - a[1].length);
  
  const body = sortedContractors.map(([cId, items]) => {
    const c = getContractor(cId);
    // Sort items: critical first, then by lateBy desc
    items.sort((a, b) => {
      const sevOrder = { critical: 0, high: 1, medium: 2 };
      const sa = sevOrder[a.late.severity] ?? 3;
      const sb = sevOrder[b.late.severity] ?? 3;
      if (sa !== sb) return sa - sb;
      return b.late.lateBy - a.late.lateBy;
    });
    
    return `
      <div class="area-card">
        <div class="area-header" style="background:${c?.color}11; border-left:4px solid ${c?.color}">
          <div class="area-title-block">
            <span class="contractor-pill" style="background:${c?.color};color:#fff; padding:4px 12px; font-size:13px">${c?.shortName}</span>
            <span class="area-name">${escapeHtml(c?.name || cId)}</span>
            <span class="warning-pill" style="background:#FEE2E2;color:#991B1B">${items.length} to update</span>
          </div>
        </div>
        <div style="padding:8px 12px">
          ${items.map(({ act }) => renderActivityRow(act, true)).join("")}
        </div>
      </div>`;
  }).join("");
  
  return summary + body;
}

// Export forecast updates as XLSX — one sheet per contractor + Summary sheet
function exportForecastUpdatesXLSX() {
  const lateActs = activities
    .filter(a => a.status !== "completed")
    .map(a => ({ act: a, late: getForecastLateStatus(a) }))
    .filter(x => x.late !== null);
  
  if (lateActs.length === 0) {
    alert("✅ No activities need forecast update. Nothing to export.");
    return;
  }
  
  // Group by contractor
  const byContractor = {};
  lateActs.forEach(x => {
    if (!byContractor[x.act.contractor]) byContractor[x.act.contractor] = [];
    byContractor[x.act.contractor].push(x);
  });
  
  const wb = XLSX.utils.book_new();
  const today = getToday();
  
  // ─── Sheet 1: SUMMARY ───
  const summaryRows = [
    ["AHF PROJECT — FORECAST UPDATES REQUIRED"],
    [`Generated on: ${today}`],
    [`Total activities to update: ${lateActs.length}`],
    [],
    ["Contractor", "Total Late", "Planned Late", "In Progress Late", "Critical (>14d)", "Max Delay (days)"],
  ];
  Object.entries(byContractor)
    .sort((a, b) => b[1].length - a[1].length)
    .forEach(([cId, items]) => {
      const c = getContractor(cId);
      const planLate = items.filter(x => x.late.type === "planned_late").length;
      const inProgLate = items.filter(x => x.late.type === "in_progress_late").length;
      const critCount = items.filter(x => x.late.severity === "critical").length;
      const maxDelay = Math.max(...items.map(x => x.late.lateBy));
      summaryRows.push([c?.name || cId, items.length, planLate, inProgLate, critCount, maxDelay]);
    });
  summaryRows.push([]);
  summaryRows.push(["TOTAL", lateActs.length,
    lateActs.filter(x => x.late.type === "planned_late").length,
    lateActs.filter(x => x.late.type === "in_progress_late").length,
    lateActs.filter(x => x.late.severity === "critical").length,
    Math.max(...lateActs.map(x => x.late.lateBy)),
  ]);
  
  const wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
  // Column widths
  wsSummary["!cols"] = [{ wch: 28 }, { wch: 12 }, { wch: 14 }, { wch: 18 }, { wch: 16 }, { wch: 16 }];
  // Merge title row
  wsSummary["!merges"] = [
    { s: { r: 0, c: 0 }, e: { r: 0, c: 5 } },
    { s: { r: 1, c: 0 }, e: { r: 1, c: 5 } },
    { s: { r: 2, c: 0 }, e: { r: 2, c: 5 } },
  ];
  // Header styling (works in some Excel versions; SheetJS community has limited style support)
  if (wsSummary["A1"]) wsSummary["A1"].s = { font: { bold: true, sz: 14, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "0A2540" } }, alignment: { horizontal: "center" } };
  // Header row of the table (row index 4 → row 5)
  ["A5", "B5", "C5", "D5", "E5", "F5"].forEach(addr => {
    if (wsSummary[addr]) wsSummary[addr].s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "0A2540" } } };
  });
  XLSX.utils.book_append_sheet(wb, wsSummary, "Summary");
  
  // ─── One sheet per contractor ───
  const headers = [
    "Activity ID", "Area", "Zone", "Discipline", "Activity Description",
    "Status", "Progress %",
    "Planned Start", "Planned Finish",
    "Current Forecast Start", "Current Forecast Finish",
    "Late Type", "Days Late", "Severity",
    "Action Required",
    "NEW Forecast Start (to fill)", "NEW Forecast Finish (to fill)", "Delay Reason (to fill)",
  ];
  
  Object.entries(byContractor)
    .sort((a, b) => b[1].length - a[1].length)
    .forEach(([cId, items]) => {
      const c = getContractor(cId);
      
      // Sort by severity then by lateBy desc
      items.sort((a, b) => {
        const sevOrder = { critical: 0, high: 1, medium: 2 };
        const sa = sevOrder[a.late.severity] ?? 3;
        const sb = sevOrder[b.late.severity] ?? 3;
        if (sa !== sb) return sa - sb;
        return b.late.lateBy - a.late.lateBy;
      });
      
      const rows = [
        [`Contractor: ${c?.name || cId}  —  ${items.length} activities to update  —  As of ${today}`],
        [],
        headers,
      ];
      
      items.forEach(({ act, late }) => {
        const a = getArea(act.area);
        const lateTypeLabel = late.type === "planned_late" ? "PLANNED LATE (never started)" : "IN PROGRESS LATE (overdue)";
        const action = late.type === "planned_late"
          ? "Confirm new forecast start date OR mark blocked with reason"
          : "Confirm new forecast finish date AND explain delay cause";
        
        rows.push([
          act.activityId || `ACT-${act.id}`,
          a?.name || act.area,
          a?.zone || "",
          act.discipline || "",
          act.activity || "",
          act.status,
          act.progress || 0,
          act.startDate || "",
          act.endDate || "",
          act.forecastStart || "",
          act.forecastEnd || "",
          lateTypeLabel,
          late.lateBy,
          late.severity.toUpperCase(),
          action,
          "", "", "", // To be filled by contractor
        ]);
      });
      
      const ws = XLSX.utils.aoa_to_sheet(rows);
      
      // Column widths
      ws["!cols"] = [
        { wch: 14 }, // Activity ID
        { wch: 24 }, // Area
        { wch: 8 },  // Zone
        { wch: 16 }, // Discipline
        { wch: 45 }, // Activity Description
        { wch: 12 }, // Status
        { wch: 9 },  // Progress
        { wch: 12 }, // Planned Start
        { wch: 12 }, // Planned Finish
        { wch: 14 }, // Current Forecast Start
        { wch: 14 }, // Current Forecast Finish
        { wch: 28 }, // Late Type
        { wch: 10 }, // Days Late
        { wch: 10 }, // Severity
        { wch: 42 }, // Action Required
        { wch: 18 }, // NEW Forecast Start
        { wch: 18 }, // NEW Forecast Finish
        { wch: 32 }, // Delay Reason
      ];
      
      // Merge title row
      ws["!merges"] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 17 } }];
      
      // Style title (row 1)
      if (ws["A1"]) ws["A1"].s = {
        font: { bold: true, sz: 13, color: { rgb: "FFFFFF" } },
        fill: { fgColor: { rgb: (c?.color || "0A2540").replace("#", "") } },
        alignment: { horizontal: "center", vertical: "center" },
      };
      
      // Style header row (row 3)
      for (let col = 0; col < headers.length; col++) {
        const addr = XLSX.utils.encode_cell({ r: 2, c: col });
        if (ws[addr]) ws[addr].s = {
          font: { bold: true, color: { rgb: "FFFFFF" }, sz: 10 },
          fill: { fgColor: { rgb: "0A2540" } },
          alignment: { horizontal: "center", vertical: "center", wrapText: true },
          border: {
            top: { style: "thin", color: { rgb: "FFFFFF" } },
            bottom: { style: "thin", color: { rgb: "FFFFFF" } },
            left: { style: "thin", color: { rgb: "FFFFFF" } },
            right: { style: "thin", color: { rgb: "FFFFFF" } },
          },
        };
      }
      
      // Style data rows — color severity column (col 13) + highlight "to fill" cols (15, 16, 17)
      for (let r = 3; r < rows.length; r++) {
        const sev = rows[r][13];
        const sevColor = sev === "CRITICAL" ? "7F1D1D" : sev === "HIGH" ? "DC2626" : "F59E0B";
        const sevAddr = XLSX.utils.encode_cell({ r, c: 13 });
        if (ws[sevAddr]) ws[sevAddr].s = {
          font: { bold: true, color: { rgb: "FFFFFF" }, sz: 10 },
          fill: { fgColor: { rgb: sevColor } },
          alignment: { horizontal: "center" },
        };
        // Highlight "to fill" columns in yellow
        ["O", "P", "Q"].forEach((colLetter, idx) => {
          const addr = XLSX.utils.encode_cell({ r, c: 15 + idx });
          if (!ws[addr]) ws[addr] = { v: "", t: "s" };
          ws[addr].s = {
            fill: { fgColor: { rgb: "FFF9C4" } },
            border: {
              top: { style: "thin", color: { rgb: "F59E0B" } },
              bottom: { style: "thin", color: { rgb: "F59E0B" } },
              left: { style: "thin", color: { rgb: "F59E0B" } },
              right: { style: "thin", color: { rgb: "F59E0B" } },
            },
          };
        });
      }
      
      // Freeze top 3 rows (title + blank + headers)
      ws["!freeze"] = { xSplit: 0, ySplit: 3 };
      
      // Sheet name (Excel limit: 31 chars, no special chars)
      let sheetName = (c?.shortName || cId).substring(0, 31).replace(/[\\/?*[\]:]/g, "");
      if (!sheetName) sheetName = `Contractor_${cId}`;
      // Ensure uniqueness
      let suffix = 0;
      let finalName = sheetName;
      while (wb.SheetNames.includes(finalName)) {
        suffix++;
        finalName = `${sheetName.substring(0, 28)}_${suffix}`;
      }
      
      XLSX.utils.book_append_sheet(wb, ws, finalName);
    });
  
  // Write file
  XLSX.writeFile(wb, `AHF_Forecast_Updates_${today}.xlsx`);
}

function renderClashesTab() {
  const potential = getPotentialClashes().filter(p => !p.existingClash);
  const sortedClashes = [...clashes].sort((a, b) => {
    const sev = { critical: 0, high: 1, medium: 2, low: 3 };
    return (sev[a.severity] ?? 3) - (sev[b.severity] ?? 3);
  });

  return `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:8px">
      <div style="font-size:11px; color:#6B7280">
        ${clashes.filter(c => c.status !== "resolved").length} active co-activities · ${clashes.filter(c => c.severity === "critical").length} critical
      </div>
      <button class="btn-clash" onclick="openClashModal()">⚠ Declare a co-activity</button>
    </div>

    ${potential.length > 0 ? `
      <div class="auto-clash-banner">
        <div class="auto-clash-title">🔍 Potential co-activities auto-detected</div>
        ${potential.map(p => `
          <div class="auto-clash-row">
            <div style="display:flex; align-items:center; gap:8px; flex:1; flex-wrap:wrap">
              <span>⚡</span>
              <span style="font-size:12px; font-family:'Inter', sans-serif"><b>${escapeHtml(p.area?.name || "")}</b> — ${p.count} contractors:</span>
              <div style="display:flex; gap:4px">
                ${p.contractors.map(cId => {
                  const c = getContractor(cId);
                  return `<span style="font-size:10px; padding:1px 6px; border-radius:3px; background:${c?.color}22; color:${c?.color}; font-weight:600">${c?.name}</span>`;
                }).join("")}
              </div>
            </div>
            <button class="btn-declare-mini" onclick="openClashModal(null, '${p.areaId}', ${JSON.stringify(p.contractors).replace(/"/g, "&quot;")})">Declare</button>
          </div>
        `).join("")}
      </div>` : ""}

    ${sortedClashes.map(clash => {
      const area = getArea(clash.area);
      const ct = getClashType(clash.type);
      const sevLabels = { critical: "CRITICAL", high: "HIGH", medium: "MEDIUM", low: "LOW" };
      const sevColors = { critical: { text: "#991B1B", border: "#DC2626" }, high: { text: "#92400E", border: "#F59E0B" }, medium: { text: "#1E40AF", border: "#3B82F6" }, low: { text: "#166534", border: "#16A34A" } };
      const stLabels = { open: "Open", mitigated: "Mitigated", resolved: "Resolved", critical: "Critical" };
      const stColors = { open: { bg: "#FEE2E2", color: "#991B1B" }, mitigated: { bg: "#FEF3C7", color: "#92400E" }, resolved: { bg: "#DCFCE7", color: "#166534" }, critical: { bg: "#FEE2E2", color: "#7F1D1D" } };
      const sc = sevColors[clash.severity] || sevColors.medium;
      const stc = stColors[clash.status] || stColors.open;

      return `
        <div class="clash-card ${clash.severity}">
          <div class="clash-header">
            <div class="clash-title-block">
              <span class="clash-icon">${ct?.icon}</span>
              <div>
                <div class="clash-title">${escapeHtml(area?.name || "")} — ${ct?.label}</div>
                <div class="clash-meta">Declared on ${clash.createdDate} · #${clash.id}</div>
              </div>
            </div>
            <div style="display:flex; gap:6px; flex-wrap:wrap">
              <span class="severity-badge" style="background:${clash.severity === "critical" ? "#FEE2E2" : clash.severity === "high" ? "#FEF3C7" : clash.severity === "medium" ? "#DBEAFE" : "#DCFCE7"};color:${sc.text};border-color:${sc.border}">${sevLabels[clash.severity]}</span>
              <span class="clash-status-badge" style="background:${stc.bg};color:${stc.color}">${stLabels[clash.status]}</span>
            </div>
          </div>
          <div style="display:flex; gap:4px; margin-bottom:10px; flex-wrap:wrap">
            ${clash.contractors.map(cId => {
              const c = getContractor(cId);
              return `<span style="font-size:10px; font-weight:600; padding:3px 10px; border-radius:4px; background:${c?.color}22; color:${c?.color}">${c?.name}</span>`;
            }).join("")}
          </div>
          <div class="clash-description">${escapeHtml(clash.description)}</div>
          ${clash.resolution ? `
            <div class="clash-resolution">
              <div class="resolution-label">💡 Proposed resolution</div>
              <div class="resolution-text">${escapeHtml(clash.resolution)}</div>
            </div>` : ""}
          ${clash.status !== "resolved" && isAdmin() ? `
            <div class="clash-actions">
              <button class="btn-mitigate" onclick="updateClashStatus(${clash.id}, 'mitigated')">Mark mitigated</button>
              <button class="btn-resolve" onclick="updateClashStatus(${clash.id}, 'resolved')">✓ Resolved</button>
            </div>` : ""}
        </div>`;
    }).join("")}`;
}

function parseExcelDate(val) {
  if (!val) return "";
  if (val instanceof Date) return val.toISOString().slice(0, 10);
  if (typeof val === "number") {
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    return d.toISOString().slice(0, 10);
  }
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)) {
    const [d, m, y] = s.split("/");
    return `${y}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
  }
  return s;
}

// Read standardized Excel template (AHF_DSA_STANDARDIZED_*.xlsx format)
function parseExcelFile(file, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: "array", cellDates: true });

      // The standardized template has an 'Activities' sheet
      if (!wb.Sheets["Activities"]) {
        callback({ success: false, error: "Sheet 'Activities' not found. Use the standardized template.", fileName: file.name });
        return;
      }

      const rows = XLSX.utils.sheet_to_json(wb.Sheets["Activities"], { header: 1, defval: "" });
      if (rows.length < 2) {
        callback({ success: false, error: "Sheet is empty", fileName: file.name });
        return;
      }

      // Build header → column index map (the first row is the header)
      const header = rows[0].map(h => String(h || "").trim());
      const idx = {};
      header.forEach((h, i) => { idx[h] = i; });

      // Required columns
      const required = ["Activity", "Contractor ID (app)", "Area ID (app)"];
      const missing = required.filter(c => !(c in idx));
      if (missing.length) {
        callback({ success: false, error: "Missing column(s): " + missing.join(", "), fileName: file.name });
        return;
      }

      const get = (row, col) => row[idx[col]] !== undefined ? row[idx[col]] : "";

      const parsed = [];
      const errors = [];
      const validStatuses = ["planned", "in_progress", "completed", "blocked"];

      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r || r.length === 0) continue;
        
        const activity = String(get(r, "Activity") || "").trim();
        if (!activity) continue;
        
        const contractor = String(get(r, "Contractor ID (app)") || "").trim().toLowerCase();
        const area = String(get(r, "Area ID (app)") || "").trim().toLowerCase();
        const discipline = String(get(r, "Discipline") || "").trim();
        const status = String(get(r, "Status") || "planned").trim().toLowerCase().replace(/ /g, "_");
        const statusId = validStatuses.includes(status) ? status : "planned";
        
        let progress = parseFloat(get(r, "Progress %"));
        if (isNaN(progress)) progress = 0;
        progress = Math.min(100, Math.max(0, Math.round(progress)));
        
        let priority = parseInt(get(r, "Priority"));
        if (isNaN(priority) || priority < 1 || priority > 3) priority = 2;
        
        const startDate = parseExcelDate(get(r, "Planned Start"));
        const endDate = parseExcelDate(get(r, "Planned Finish"));
        const forecastStart = parseExcelDate(get(r, "Forecast Start")) || startDate;
        const forecastEnd = parseExcelDate(get(r, "Forecast Finish")) || endDate;
        // Baseline columns (the original contractual dates — kept as reference next to forecast)
        const baselineStart = parseExcelDate(get(r, "Baseline Start")) || startDate;
        const baselineEnd = parseExcelDate(get(r, "Baseline Finish")) || endDate;
        
        const quantity = get(r, "Quantity");
        const unit = String(get(r, "Unit") || "").trim();
        const zone = String(get(r, "Zone") || "").trim();
        const subArea = String(get(r, "Sub-area") || "").trim();
        const sourceFile = String(get(r, "Source File") || "").trim();
        const extActivityId = String(get(r, "Activity ID") || "").trim();
        const notes = String(get(r, "Notes") || "").trim();
        
        parsed.push({
          area: area || "general",
          contractor: contractor || "other",
          discipline,
          activity,
          priority,
          status: statusId,
          startDate,
          endDate,
          baselineStart,
          baselineEnd,
          forecastStart,
          forecastEnd,
          progress,
          quantity: quantity !== "" && quantity !== null ? quantity : "",
          unit,
          zone,
          subArea,
          extActivityId,
          sourceFile,
          notes,
        });
      }

      callback({
        success: true,
        activities: parsed,
        errors,
        fileName: file.name,
        rowCount: parsed.length,
      });
    } catch (err) {
      callback({ success: false, error: "Read error: " + err.message, fileName: file.name });
    }
  };
  reader.readAsArrayBuffer(file);
}

function handleFileImport(files) {
  if (!files || files.length === 0) return;
  state.importStaging = { processing: true, files: [...files], results: [] };
  render();
  let processed = 0;
  for (const file of files) {
    parseExcelFile(file, result => {
      state.importStaging.results.push(result);
      processed++;
      if (processed === files.length) {
        state.importStaging.processing = false;
        render();
      }
    });
  }
}

async function confirmImport() {
  if (!state.importStaging) return;
  const successfulFiles = state.importStaging.results.filter(r => r.success);
  if (successfulFiles.length === 0) {
    alert("No file was parsed successfully.");
    return;
  }
  
  // Aggregate all activities from all files
  const allActs = [];
  for (const result of successfulFiles) {
    for (const a of result.activities) allActs.push(a);
  }
  
  if (allActs.length === 0) {
    alert("No activity to import.");
    return;
  }
  
  if (!firestoreReady) {
    alert("⚠ Firebase not connected. Cannot save to the cloud.\n\nPlease wait a few seconds and try again.");
    return;
  }
  
  // Confirm with the user — this is a destructive operation
  const ok = confirm(
    `⚠ REPLACE ALL ACTIVITIES?\n\n` +
    `This will:\n` +
    `  • Delete the current activities in Firebase (visible by all users)\n` +
    `  • Import ${allActs.length} new activities from the Excel file\n\n` +
    `Continue?`
  );
  if (!ok) return;
  
  // Show progress
  state.importStaging.uploading = true;
  state.importStaging.uploadProgress = { done: 0, total: allActs.length, phase: "Clearing previous activities..." };
  render();
  
  try {
    // STEP 1: Clear existing activities
    await firestoreClearActivities();
    
    // STEP 2: Bulk save with progress callback
    state.importStaging.uploadProgress = { done: 0, total: allActs.length, phase: "Uploading new activities..." };
    render();
    
    await firestoreBulkSaveActivities(allActs, (done, total) => {
      state.importStaging.uploadProgress = { done, total, phase: "Uploading new activities..." };
      render();
    });
    
    // Done — Firestore subscription will refresh the activities array automatically
    state.importResult = { totalAdded: allActs.length, week: state.currentWeek };
    state.importStaging = null;
    state.modal = null;
    render();
    setTimeout(() => { state.importResult = null; render(); }, 5000);
  } catch (err) {
    console.error("Import error:", err);
    alert("Import failed: " + err.message);
    state.importStaging.uploading = false;
    render();
  }
}

function cancelImport() {
  state.importStaging = null;
  render();
}

function getAvailableWeeks() {
  const weeks = new Set();
  weeks.add(state.currentWeek);
  importHistory.forEach(h => weeks.add(h.week));
  activities.forEach(a => { if (a.importsdWeek) weeks.add(a.importsdWeek); });
  return [...weeks].sort().reverse();
}

function getWeekNumber(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

        // Group activities by contractor for a nice summary
        const byContractor = {};
        for (const a of r.activities) {
          byContractor[a.contractor] = (byContractor[a.contractor] || 0) + 1;
        }
        const contractorRows = Object.entries(byContractor)
          .sort((a, b) => b[1] - a[1])
          .map(([cid, count]) => {
            const c = getContractor(cid);
            return `<span style="background:${c?.color || "#888"}22; color:${c?.color || "#444"}; padding:2px 8px; border-radius:4px; font-size:10px; margin-right:6px; margin-bottom:4px; display:inline-block; font-weight:600">${c?.name || cid} · ${count}</span>`;
          }).join("");
        return `<div class="import-result">
          <div class="import-result-title" style="color:#16A34A">✓ ${escapeHtml(r.fileName)}</div>
          <div class="import-result-line">📋 <b>${r.activities.length}</b> activities identified, across ${Object.keys(byContractor).length} contractor(s):</div>
          <div style="margin-top:6px">${contractorRows}</div>
          ${r.errors && r.errors.length > 0 ? `<div class="import-result-line" style="color:#92400E; margin-top:6px">⚠ ${r.errors.length} line(s) ignored</div>` : ""}
        </div>`;
      }).join("")}
      <div style="margin-top:12px; padding:10px; background:#FEF3C7; border-radius:6px; border-left:3px solid #F59E0B; font-size:11px; color:#92400E; line-height:1.6">
        <b>⚠ Confirming will:</b><br>
        • <b>Delete</b> all activities currently in Firebase (shared cloud database)<br>
        • <b>Replace</b> them with the ${total} activities from this file<br>
        • Changes will be immediately visible by all users connected to the app
      </div>`;
  }

  const isFinalStep = staging && !staging.processing && !staging.uploading;
  const canConfirm = isFinalStep && staging.results.some(r => r.success);

  return `
    <div class="modal-overlay" onclick="closeImportModal(event)">
      <div class="modal" onclick="event.stopPropagation()" style="max-width:680px">
        <button class="modal-close" onclick="closeImportModal()">×</button>
        <div class="modal-title">⇪ Excel Import — Standardized Planning</div>
        ${body}
        <div class="modal-actions">
          ${isFinalStep ? `
            <button class="btn-cancel" onclick="cancelImport(); state.modal = null; render()">Cancel</button>

          ` : staging && staging.uploading ? `` : `
            <button class="btn-cancel" onclick="closeImportModal()">Close</button>
          `}
        </div>
      </div>
    </div>`;
}

async function saveActivity() {
  const f = state.modal.form;
  if (!f.area || !f.contractor || !f.activity) {
    alert("Please fill in: Area, Contractor, and Activity description.");
    return;
  }
  try {
    if (state.editingId) {
      const idx = activities.findIndex(a => String(a.id) === String(state.editingId));
      if (idx !== -1) {
        const updated = { ...activities[idx], ...f };
        activities[idx] = updated;
        await firestoreSaveSingleActivity(updated);
      }
    } else {
      // New activity — local + Firestore
      const newAct = { ...f, id: Date.now() };
      activities.push(newAct);
      await firestoreSaveSingleActivity(newAct);
    }
    state.modal = null;
    state.editingId = null;
    render();
  } catch (e) {
    // Error already alerted in firestoreSaveSingleActivity
    console.error("Save activity failed:", e);
  }
}

function updateForm(field, value) {
  if (state.modal && state.modal.form) {
    state.modal.form[field] = value;
  }
}

async function deleteActivity(id) {
  if (!confirm("Delete this activity?")) return;
  const idx = activities.findIndex(a => String(a.id) === String(id));
  if (idx === -1) return;
  const act = activities[idx];
  const docId = act._docId;
  // Remove locally first for snappy UI
  activities.splice(idx, 1);
  render();
  // Then delete from Firestore (Firestore subscription will reconcile if it fails)
  try {
    if (docId) await firestoreDeleteSingleActivity(docId);
  } catch (e) {
    console.error("Delete failed, Firestore subscription will restore:", e);
  }
}

async function updateProgress(id, delta) {
  const a = activities.find(x => String(x.id) === String(id));
  if (!a) {
    console.warn("Activity not found for ID:", id);
    return;
  }
  // INCREMENT by delta (default +10)
  const inc = parseInt(delta) || 10;
  const newProgress = Math.min(100, Math.max(0, (a.progress || 0) + inc));
  a.progress = newProgress;
  // Auto-update status based on new progress
  if (a.progress >= 100) a.status = "completed";
  else if (a.progress > 0 && a.status === "planned") a.status = "in_progress";
  render();
  // Sync to Firestore
  try {
    await firestoreSaveSingleActivity(a);
  } catch (e) {
    console.error("Update progress sync failed:", e);
  }
}

// ═══════════════════════════════════════════════════════════
//  RENDER STABILITY LAYER  (added v2.1)
//  Fixes: taps lost when a background Firestore sync re-renders
//  the DOM mid-interaction, and lost scroll/focus on every render.
//
//  render()      → safe public entry point (call this everywhere)
//  _renderNow()  → your original render logic, untouched
// ═══════════════════════════════════════════════════════════
let _touchActive = false;       // true while a finger is down
let _renderQueued = false;      // a render asked to run during a touch
let _renderScheduled = false;   // coalesce multiple render() calls per frame

// Track touch state globally so we never rebuild the DOM under a finger
document.addEventListener("touchstart", () => { _touchActive = true; }, { passive: true });
document.addEventListener("touchend", () => {
  _touchActive = false;
  if (_renderQueued) { _renderQueued = false; render(); }
}, { passive: true });
document.addEventListener("touchcancel", () => {
  _touchActive = false;
  if (_renderQueued) { _renderQueued = false; render(); }
}, { passive: true });

function render() {
  // If the user is mid-tap, defer the rebuild until the finger lifts.
  // A click in progress will still complete before the DOM is replaced.
  if (_touchActive) { _renderQueued = true; return; }

  // Coalesce bursts of render() calls into a single repaint per frame.
  if (_renderScheduled) return;
  _renderScheduled = true;
  requestAnimationFrame(() => {
    _renderScheduled = false;
    _renderNow();
  });
}

function _renderNow() {
  const appEl = document.getElementById("app");
  // Preserve scroll position across the innerHTML rebuild
  const prevScroll = window.scrollY;
  // Preserve which field had focus (so typing isn't interrupted by a sync)
  const active = document.activeElement;
  const focusId = active && active.id ? active.id : null;
  const selStart = active && "selectionStart" in active ? active.selectionStart : null;

  // ─── AUTH GATE: show login if no session ───
  if (!state.session) {
    appEl.innerHTML = renderLoginScreen();
    // Auto-focus password input
    setTimeout(() => {
      const pwInput = document.getElementById("admin-password");
      if (pwInput) pwInput.focus();
    }, 50);
    return;
  }

  let content = "";
  if (state.tab === "site") content = renderSiteTab();
  else if (state.tab === "planning") content = renderPlanningTab();
  else if (state.tab === "lookahead") content = renderLookAheadTab();
  else if (state.tab === "forecast_updates") content = renderForecastUpdatesTab();
  else if (state.tab === "critical") content = renderCriticalPathTab();
  else if (state.tab === "clashes") content = renderClashesTab();
  else if (state.tab === "heatmap") content = renderHeatmapTab();

  let modalHtml = "";
  if (state.modal?.type === "activity") modalHtml = renderActivityModal();
  else if (state.modal?.type === "clash") modalHtml = renderClashModal();
  else if (state.modal?.type === "import") modalHtml = renderImportModal();
  else if (state.modal?.type === "weeks") modalHtml = renderWeeksModal();
  else if (state.modal?.type === "template") modalHtml = renderTemplateModal();
  else if (state.modal?.type === "costcontrol") modalHtml = renderCostControlModal();
  if (state.feedbackModal) modalHtml += renderFeedbackModal();

  // Toast notification
  let toastHtml = "";
  if (state.importResult) {
    toastHtml = `<div style="position:fixed; bottom:24px; right:24px; background:#0A2540; border:2px solid #7FA8D8; border-radius:10px; padding:14px 20px; color:#FFFFFF; font-size:12px; font-weight:600; box-shadow:0 8px 24px rgba(10,37,64,0.4); z-index:2000">
      <span style="color:#7FA8D8">✓</span> <b>${state.importResult.totalAdded} activities imported</b> for week ${state.importResult.week}
    </div>`;
  }

  document.getElementById("app").innerHTML = `
    ${renderHeader()}
    ${renderTabs()}
    <div class="content">${content}</div>
    ${modalHtml}
    ${toastHtml}
  `;

  // ─── Restore scroll + focus so a background sync never disrupts the user ───
  if (prevScroll) window.scrollTo(0, prevScroll);
  if (focusId) {
    const again = document.getElementById(focusId);
    if (again) {
      again.focus();
      if (selStart != null && "setSelectionRange" in again) {
        try { again.setSelectionRange(selStart, selStart); } catch (e) {}
      }
    }
  }
}

            <input type="password" id="admin-password" class="login-input" placeholder="Admin password"
              onkeydown="if(event.key==='Enter') attemptLogin(this.value)"
              autocomplete="current-password" />
            ${state.loginError ? `<div class="login-error">⚠ ${escapeHtml(state.loginError)}</div>` : ""}
            <button class="login-btn primary" onclick="attemptLogin(document.getElementById('admin-password').value)">Sign In</button>
            <button class="login-btn secondary" onclick="state.loginMode='guest'; render()">Switch to Guest View</button>
          </div>
        `}

        <div class="login-footer">
          <span>v2.0 · ${new Date().toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" })}</span>
        </div>
      </div>
    </div>
  `;
}

function downloadTemplateInfo() {
  state.modal = { type: "template" };
  render();
}

// Initial render — run immediately (not deferred) so there's no first-paint flash
_renderNow();
</script>
</body>
</html>
